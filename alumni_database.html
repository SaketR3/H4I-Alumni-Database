    <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-blue: #00508F; /* Hack4Impact brand blue */
            --white: #FFFFFF;
            --text-dark: #1A202C;
            --text-gray: #4A5568;
            --text-on-blue: #F7F9FC;
            --border-light: #E2E8F0;
            --radius-md: 12px;
            --radius-sm: 8px;
            --shadow-sm: 0 2px 4px rgba(0, 0, 0, 0.04);
            --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.08);
            --transition: all 0.2s ease-in-out;
        }

        body {
            font-family: 'Hanken Grotesk', sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--primary-blue);
            color: var(--text-dark);
            -webkit-font-smoothing: antialiased;
        }

        .navbar {
            background-color: var(--white);
            padding: 15px 40px;
            border-bottom: 1px solid var(--border-light);
            display: flex;
            align-items: center;
            justify-content: flex-start; /* Logo on the left */
            box-shadow: var(--shadow-sm);
            box-sizing: border-box;
            height: 70px;
        }

        .navbar-logo {
            height: 40px; 
            width: auto;
            display: block;
        }

        .container {
            max-width: 760px;
            margin: 60px auto;
            padding: 0 20px;
        }

        .page-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .page-header h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 10px;
            letter-spacing: -1px;
            color: var(--white); /* White text on blue background */
        }

        .page-header p {
            font-size: 1.1rem;
            margin: 0;
            color: rgba(255, 255, 255, 0.8);
        }

        .search-container {
            position: relative;
            margin-bottom: 40px;
        }

        .search-bar {
            width: 100%;
            padding: 18px 24px;
            font-size: 1.1rem;
            font-family: 'Hanken Grotesk', sans-serif;
            color: var(--text-dark);
            background-color: var(--white);
            border: 2px solid var(--border-light);
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-md);
            transition: var(--transition);
            box-sizing: border-box;
        }

        .search-bar::placeholder {
            color: #A0AEC0;
        }

        .search-bar:focus {
            outline: none;
            border-color: #5396cd; 
            box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.2);
        }

        .results-container {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 60px;
        }

        .result-card {
            background: var(--white);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-md);
            padding: 24px;
            box-shadow: var(--shadow-sm);
            transition: var(--transition);
        }

        .result-card:hover {
            box-shadow: var(--shadow-md);
            transform: translateY(-2px);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }

        .name {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--text-dark);
            margin: 0;
        }

        .tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 16px;
        }

        .tag {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 0.3px;
        }

        .tag-intern {
            background-color: #EBF8FF;
            color: #2B6CB0;
        }

        .tag-current {
            background-color: #F0FFF4;
            color: #2F855A;
        }

        .contact-info {
            display: flex;
            gap: 24px;
            font-size: 0.95rem;
            color: var(--text-gray);
        }

        .contact-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .contact-item a {
            color: var(--primary-blue);
            text-decoration: none;
            font-weight: 600;
            transition: var(--transition);
        }

        .contact-item a:hover {
            text-decoration: underline;
        }

        .no-results {
            text-align: center;
            padding: 40px;
            color: var(--white);
            font-size: 1.1rem;
        }

        .icon {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }
    </style>
</head>

    const searchInput = document.getElementById('searchInput');
    const resultsDiv = document.getElementById('results');

    const phoneIcon = `<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>`;
    const linkedinIcon = `<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"></path><rect x="2" y="9" width="4" height="12"></rect><circle cx="4" cy="4" r="2"></circle></svg>`;

    function displayResults(query) {
        resultsDiv.innerHTML = '';
        if (!query.trim()) return;
        
        const lowerQuery = query.toLowerCase();
        let found = false;

        alumniData.forEach(person => {
            let internships = person.Internships ? person.Internships.toLowerCase() : '';
            let current = person.Current ? person.Current.toLowerCase() : '';
            
            let matchIntern = internships.includes(lowerQuery);
            let matchCurrent = current.includes(lowerQuery);
            
            if (matchIntern || matchCurrent) {
                found = true;
                
                let tagsHTML = '';
                if (matchIntern) {
                    tagsHTML += `<span class="tag tag-intern">Internship</span>`;
                }
                if (matchCurrent) {
                    tagsHTML += `<span class="tag tag-current">Current</span>`;
                }
                
                let phoneHTML = person.Contact ? `<div class="contact-item">${phoneIcon} <span>${person.Contact}</span></div>` : '';
                
                let linkedinHTML = person.LinkedIn ? `<div class="contact-item">${linkedinIcon} <a href="${person.LinkedIn}" target="_blank">LinkedIn Profile</a></div>` : '';

                const card = document.createElement('div');
                card.className = 'result-card';
                card.innerHTML = `
                    <div class="card-header">
                        <h3 class="name">${person.Name}</h3>
                    </div>
                    <div class="tags">
                        ${tagsHTML}
                    </div>
                    <div class="contact-info">
                        ${phoneHTML}
                        ${linkedinHTML}
                    </div>
                `;
                resultsDiv.appendChild(card);
            }
        });
        
        if (!found) {
            resultsDiv.innerHTML = '<div class="no-results">No alumni found for this company. Try another search.</div>';
        }
    }

    searchInput.addEventListener('input', (e) => {
        displayResults(e.target.value);
    });
</script>
